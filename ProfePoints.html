<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>⭐ ProfePoints</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.4.4/lz-string.min.js"></script>
<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;background:#F8FAFC;min-height:100vh}
button{cursor:pointer;font-family:'Nunito',sans-serif;transition:opacity .15s}
button:hover{opacity:.85}
input,select,textarea{font-family:'Nunito',sans-serif}
input:focus,select:focus{outline:none;box-shadow:0 0 0 3px #6366F130}
#header{background:linear-gradient(135deg,#1e293b,#334155);padding:16px 28px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
#header h1{color:#fff;font-size:24px;font-weight:900;letter-spacing:-.5px}
#header p{color:#94a3b8;font-size:12px;margin-top:2px}
.hstat{text-align:center}
.hstat-num{color:#fff;font-weight:800;font-size:20px}
.hstat-lbl{color:#64748b;font-size:11px}
#save-status{font-size:12px;min-width:90px;text-align:right;color:#10b981}
#main-tabs{background:#fff;border-bottom:2px solid #f1f5f9;padding:0 24px;display:flex;gap:2px;overflow-x:auto}
.main-tab{background:none;border:none;padding:13px 15px;font-weight:700;font-size:13px;color:#64748b;border-bottom:3px solid transparent;margin-bottom:-2px;white-space:nowrap}
.main-tab.active{color:#6366F1;border-bottom-color:#6366F1}
#content{padding:22px 24px;max-width:980px;margin:0 auto}
#course-tabs{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px}
.course-tab{background:#fff;border:2px solid #e2e8f0;border-radius:10px;padding:7px 16px;font-weight:700;font-size:13px;color:#475569}
.course-panel{border-radius:20px;padding:20px;border:2px solid;margin-bottom:20px}
.course-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:10px;flex-wrap:wrap}
.course-title-input{font-size:18px;font-weight:800;border-radius:8px;padding:3px 10px;color:#1e293b;border:2px solid;background:#fff}
.cstat{text-align:center;min-width:44px}
.cstat-num{font-size:17px;font-weight:800}
.cstat-lbl{font-size:10px;color:#94a3b8;font-weight:600}
/* student rows */
.student-row{display:flex;align-items:center;gap:10px;background:#fff;border-radius:14px;padding:9px 12px;box-shadow:0 1px 4px rgba(0,0,0,.06);margin-bottom:7px;border:1.5px solid transparent;transition:border-color .15s,background .15s}
.student-row.selected{background:#EEF2FF;border-color:#6366F1!important}
.sel-check{width:20px;height:20px;border-radius:6px;border:2px solid #d1d5db;background:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;transition:all .15s}
.sel-check.checked{background:#6366F1;border-color:#6366F1;color:#fff;font-size:12px}
.avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:12px;flex-shrink:0}
.student-name{font-weight:700;font-size:13px;color:#1e293b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.points-row{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.pt-badge{display:flex;align-items:center;gap:3px;border-radius:20px;padding:2px 8px 2px 5px;border:1px solid}
.pt-icon{font-size:13px}
.pt-val{font-size:11px;font-weight:700;min-width:16px;text-align:center}
.pt-minus{background:none;border:none;color:#bbb;font-size:13px;padding:0 1px;line-height:1}
.pt-plus{border:none;color:#fff;font-size:13px;border-radius:50%;width:17px;height:17px;display:flex;align-items:center;justify-content:center;line-height:1;flex-shrink:0}
.student-info{flex:1;min-width:0}
.student-total{text-align:center;min-width:46px}
.total-num{font-size:20px;font-weight:900}
.total-lbl{font-size:10px;color:#94a3b8;font-weight:600}
.saldo{font-size:11px;font-weight:700;margin-top:1px}
.del-btn{background:none;border:none;color:#fca5a5;font-size:15px;padding:4px;border-radius:6px}
.add-row{display:flex;gap:8px;margin-top:10px}
.add-input{flex:1;border:2px solid #e2e8f0;border-radius:10px;padding:7px 12px;font-size:13px;color:#1e293b;background:#fff}
.add-btn{border:none;border-radius:10px;padding:7px 16px;font-weight:700;font-size:13px;color:#fff}
/* selection bar */
.sel-bar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;background:#EEF2FF;border:2px solid #6366F1;border-radius:14px;padding:10px 14px;margin-bottom:14px}
.sel-bar-count{font-weight:800;color:#6366F1;font-size:14px;flex:1}
.sel-action-btn{border:none;border-radius:9px;padding:6px 13px;font-weight:700;font-size:12px;color:#fff;cursor:pointer}
/* amt selector */
.amt-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.amt-chip{border:2px solid #e2e8f0;border-radius:8px;padding:5px 12px;font-weight:700;font-size:13px;background:#fff;color:#64748b;cursor:pointer;transition:all .15s}
.amt-chip.active{background:#6366F1;border-color:#6366F1;color:#fff}
.amt-custom{border:2px solid #e2e8f0;border-radius:8px;padding:5px 8px;font-weight:700;font-size:13px;width:70px;color:#1e293b;text-align:center}
/* toolbar */
.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;padding:12px 16px;background:#fff;border-radius:14px;box-shadow:0 1px 4px rgba(0,0,0,.06);align-items:center}
.toolbar-title{font-size:13px;font-weight:700;color:#64748b;margin-right:4px}
.btn-solid{border:none;border-radius:10px;padding:7px 16px;font-weight:700;font-size:13px;color:#fff}
.file-input-label{display:inline-flex;align-items:center;gap:6px;border-radius:10px;padding:7px 14px;font-weight:700;font-size:13px;cursor:pointer;border:2px solid}
.file-input-label input{display:none}
/* groups */
.group-badge{display:inline-flex;align-items:center;gap:4px;border-radius:20px;padding:2px 9px;font-size:11px;font-weight:700;margin-left:4px}
.group-tag{border-radius:20px;padding:1px 7px;font-size:10px;font-weight:700;display:inline-block;margin-top:2px}
/* quick */
.quick-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:10px}
.quick-card{border:2px solid #f1f5f9;border-radius:12px;padding:11px;display:flex;align-items:center;gap:10px;transition:border-color .15s,background .15s;cursor:pointer}
.quick-card.selected{background:#EEF2FF;border-color:#6366F1}
.quick-name{font-size:13px;font-weight:700;color:#1e293b;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.quick-btns{display:flex;gap:4px;flex-wrap:wrap}
.qbtn{border:none;border-radius:8px;padding:4px 8px;font-weight:700;font-size:11px;color:#fff;white-space:nowrap}
/* prizes */
.prize-card{background:#fff;border-radius:16px;padding:14px;box-shadow:0 1px 4px rgba(0,0,0,.06);display:flex;align-items:flex-start;gap:12px;border:2px solid #f1f5f9}
.prize-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:12px;margin-bottom:20px}
.add-prize-form{background:#fff;border-radius:16px;padding:18px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.form-input{border:2px solid #e2e8f0;border-radius:10px;padding:8px 12px;font-size:13px;color:#1e293b;background:#fff;width:100%}
.form-label{font-size:12px;font-weight:700;color:#64748b;margin-bottom:4px}
/* spending */
.spend-section{background:#fff;border-radius:16px;padding:18px;box-shadow:0 1px 4px rgba(0,0,0,.06);margin-bottom:20px}
.spend-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #f1f5f9;flex-wrap:wrap}
.spend-row:last-child{border-bottom:none}
.spend-total{font-size:13px;font-weight:800;color:#EF4444;min-width:55px;text-align:center}
.spend-balance{font-size:13px;font-weight:800;min-width:55px;text-align:center}
.btn-canjes{border:none;border-radius:8px;padding:5px 10px;font-weight:700;font-size:12px;background:#EDE9FE;color:#8B5CF6;cursor:pointer}
/* ranking */
.rank-row{display:flex;align-items:center;gap:12px;background:#fff;border-radius:14px;padding:11px 16px;box-shadow:0 1px 4px rgba(0,0,0,.06);margin-bottom:9px;border:2px solid transparent}
.rank-course-badge{font-size:11px;border-radius:20px;padding:2px 9px;font-weight:600;display:inline-block;margin-top:2px}
.rank-pts-wrap{display:flex;gap:8px;flex-wrap:wrap}
.rank-pt{font-size:11px;font-weight:700}
/* stats */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(265px,1fr));gap:14px}
.stat-card{border-radius:20px;padding:18px;border:2px solid}
.stat-mini-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.stat-mini{background:#fff;border-radius:12px;padding:9px 12px;text-align:center}
.stat-mini-num{font-size:20px;font-weight:800}
.stat-mini-lbl{font-size:11px;color:#94a3b8}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.bar-track{height:5px;background:#e2e8f0;border-radius:3px;flex:1}
.bar-fill{height:100%;border-radius:3px;transition:width .5s}
.top-box{margin-top:10px;background:#fff;border-radius:10px;padding:7px 11px;display:flex;align-items:center;gap:7px}
/* modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px}
.modal{background:#fff;border-radius:20px;padding:24px;max-width:460px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal h3{font-size:18px;font-weight:800;color:#1e293b;margin-bottom:16px}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.section-title{font-size:21px;font-weight:800;color:#1e293b;margin-bottom:18px}
.empty-msg{text-align:center;color:#94a3b8;padding:20px 0;font-size:14px}
/* group section */
.group-section{background:#fff;border-radius:16px;padding:18px;box-shadow:0 1px 4px rgba(0,0,0,.06);margin-bottom:16px}
.group-card{border:2px solid #e2e8f0;border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:12px;margin-bottom:8px}
.group-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
@media(max-width:600px){#header{padding:12px 16px}#content{padding:14px}.form-row{grid-template-columns:1fr}.quick-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<div id="header">
  <div><h1>⭐ ProfePoints</h1><p>Sistema de puntos para el aula</p></div>
  <div style="display:flex;gap:14px;align-items:center;flex-wrap:wrap">
    <div class="hstat"><div class="hstat-num" id="total-students">0</div><div class="hstat-lbl">alumnos</div></div>
    <div class="hstat"><div class="hstat-num" id="total-points">0</div><div class="hstat-lbl">puntos</div></div>
    <button id="url-copy-btn" onclick="headerCopyURL()"
      title="Copiar link con todos los datos para abrir en otra PC"
      style="background:rgba(99,102,241,.15);border:1.5px solid rgba(99,102,241,.4);border-radius:10px;padding:6px 13px;font-size:12px;font-weight:700;color:#a5b4fc;cursor:pointer;white-space:nowrap;transition:all .2s">
      🔗 Copiar link
    </button>
    <div id="save-status">✓ guardado</div>
  </div>
</div>

<div id="main-tabs">
  <button class="main-tab active" onclick="switchTab('courses')">📋 Cursos</button>
  <button class="main-tab" onclick="switchTab('groups')">👥 Grupos</button>
  <button class="main-tab" onclick="switchTab('prizes')">🎁 Premios</button>
  <button class="main-tab" onclick="switchTab('spending')">💸 Canjes</button>
  <button class="main-tab" onclick="switchTab('ranking')">🏆 Ranking</button>
  <button class="main-tab" onclick="switchTab('stats')">📊 Stats</button>
</div>

<div id="content"></div>

<!-- MODAL general -->
<div id="modal-bg" class="modal-bg" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h3 id="modal-title"></h3>
    <div id="modal-body"></div>
    <div class="modal-footer">
      <button onclick="closeModal()" style="background:#f1f5f9;border:none;border-radius:10px;padding:9px 20px;font-weight:700;color:#64748b">Cancelar</button>
      <button id="modal-confirm" style="background:#8B5CF6;border:none;border-radius:10px;padding:9px 20px;font-weight:700;color:#fff">Confirmar</button>
    </div>
  </div>
</div>

<!-- PERFIL MODAL -->
<div id="profile-bg" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1001;padding:20px;overflow-y:auto;display:none" onclick="if(event.target===this)closeProfile()">
  <div id="profile-modal" style="background:#fff;border-radius:24px;max-width:480px;width:100%;margin:auto;box-shadow:0 24px 64px rgba(0,0,0,.22);overflow:hidden"></div>
</div>

<script>
// ─── CONSTANTS ───────────────────────────────────────────────────────────────
const PT=[
  {id:'participacion',label:'Participación',icon:'🙋',color:'#3B82F6'},
  {id:'tareas',label:'Tareas',icon:'📚',color:'#10B981'},
  {id:'comportamiento',label:'Comportamiento',icon:'⭐',color:'#F59E0B'},
  {id:'personalizado',label:'Personalizado',icon:'🎯',color:'#8B5CF6'},
];
const CC=[
  {bg:'#FEE2E2',accent:'#EF4444',light:'#FEF2F2'},
  {bg:'#DBEAFE',accent:'#3B82F6',light:'#EFF6FF'},
  {bg:'#D1FAE5',accent:'#10B981',light:'#F0FDF4'},
  {bg:'#FEF3C7',accent:'#F59E0B',light:'#FFFBEB'},
  {bg:'#EDE9FE',accent:'#8B5CF6',light:'#F5F3FF'},
  {bg:'#FCE7F3',accent:'#EC4899',light:'#FDF2F8'},
];
const GROUP_COLORS=['#EF4444','#3B82F6','#10B981','#F59E0B','#8B5CF6','#EC4899','#06B6D4','#84CC16'];
const AVC=['#6366F1','#EC4899','#14B8A6','#F97316','#8B5CF6','#06B6D4','#84CC16','#EF4444'];
const AMT_PRESETS=[1,5,10,25,50];

// ─── STATE ───────────────────────────────────────────────────────────────────
let S={
  courses:[
    {id:'c1',name:'1° Año',colorIdx:0},{id:'c2',name:'2° Año',colorIdx:1},
    {id:'c3',name:'3° Año',colorIdx:2},{id:'c4',name:'4° Año',colorIdx:3},
    {id:'c5',name:'5° Año',colorIdx:4},{id:'c6',name:'6° Año',colorIdx:5},
  ],
  students:[],
  groups:[],   // {id, name, courseId, colorIdx, studentIds:[]}
  prizes:[
    {id:'p1',emoji:'🍬',name:'Golosina',desc:'Una golosina a elección',cost:10},
    {id:'p2',emoji:'📖',name:'Sin tarea un día',desc:'Exención de tarea por un día',cost:25},
    {id:'p3',emoji:'🎮',name:'Tiempo libre',desc:'10 min de tiempo libre',cost:40},
  ],
  canjes:[],
  activeTab:'courses',
  activeCourseId:'c1',
  selectedStudents:new Set(),   // ids seleccionados en cursos
  quickSelected:new Set(),      // ids seleccionados en carga rápida
  quickCourseId:null,
  ptAmount:10,
  search:'',
};

// ─── FIREBASE CONFIG ─────────────────────────────────────────────────────────
// ⬇️  PEGÁ TUS CREDENCIALES DE FIREBASE ACÁ ⬇️
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyCuKdbAZc004rWzqdJKnBBwnCwkx1yzudg",
  authDomain:        "profepoints.firebaseapp.com",
  projectId:         "profepoints",
  storageBucket:     "profepoints.firebasestorage.app",
  messagingSenderId: "558519806479",
  appId:             "1:558519806479:web:e1254e7ba349a7e2d4d17a"
};
// ⬆️  ─────────────────────────────────────────────────────────────────────────

const FB_CONFIGURED = FIREBASE_CONFIG.apiKey !== "TU_API_KEY";
let db = null;

function initFirebase(){
  if(!FB_CONFIGURED) return;
  try{
    firebase.initializeApp(FIREBASE_CONFIG);
    db = firebase.firestore();
    // Escuchar cambios en tiempo real
    db.collection('profepoints').doc('data').onSnapshot(function(doc){
      if(doc.exists){
        const data = doc.data();
        ['courses','students','groups','prizes','canjes','ptAmount'].forEach(function(k){
          if(data[k] !== undefined) S[k] = data[k];
        });
        if(!S.groups) S.groups = [];
        if(!S.ptAmount) S.ptAmount = 10;
        render();
        setSS('☁️ sincronizado','#10b981');
      }
    }, function(err){
      setSS('⚠️ sin conexión','#F59E0B');
    });
    setSS('☁️ conectando...','#94a3b8');
  }catch(e){
    console.warn('Firebase init error:', e);
    setSS('⚠️ error Firebase','#EF4444');
  }
}

// ─── PERSISTENCE ─────────────────────────────────────────────────────────────
function load(){
  try{
    ['courses','students','groups','prizes','canjes','ptAmount'].forEach(k=>{
      const v=localStorage.getItem('pp_'+k);
      if(v!=null){const parsed=JSON.parse(v);S[k]=parsed;}
    });
  }catch(e){}
  if(!S.groups)S.groups=[];
  if(!S.ptAmount)S.ptAmount=10;
  if(!S.activeCourseId)S.activeCourseId=S.courses[0]?.id||'c1';
}
let saveTimer=null;
function save(){
  setSS('💾 guardando...','#94a3b8');
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>{
    // Guardar en localStorage (siempre, como respaldo offline)
    try{
      ['courses','students','groups','prizes','canjes','ptAmount'].forEach(k=>{
        localStorage.setItem('pp_'+k,JSON.stringify(S[k]));
      });
    }catch(e){}
    // Guardar en Firebase si está configurado
    if(db){
      const data={};
      ['courses','students','groups','prizes','canjes','ptAmount'].forEach(k=>{data[k]=S[k];});
      db.collection('profepoints').doc('data').set(data)
        .then(()=>setSS('☁️ guardado','#10b981'))
        .catch(()=>setSS('⚠️ error al guardar','#EF4444'));
    } else {
      setSS('✓ guardado local','#10b981');
    }
  },800);
}
function setSS(t,c){const el=document.getElementById('save-status');if(el){el.textContent=t;el.style.color=c;}}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2);
const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
function totalPts(st){return PT.reduce((s,t)=>s+(st.points?.[t.id]||0),0);}
function totalSpent(sid){return S.canjes.filter(c=>c.studentId===sid).reduce((s,c)=>s+c.pts,0);}
function balance(st){return totalPts(st)-totalSpent(st.id);}
function avInit(n){return n.split(' ').map(w=>w[0]||'').join('').slice(0,2).toUpperCase()||'?';}
function avColor(n){return AVC[n.charCodeAt(0)%AVC.length];}
function updateHeader(){
  document.getElementById('total-students').textContent=S.students.length;
  document.getElementById('total-points').textContent=S.students.reduce((s,st)=>s+totalPts(st),0);
}
function getAmt(){return parseInt(document.getElementById('amt-custom')?.value)||S.ptAmount;}
function studentGroups(sid){return S.groups.filter(g=>g.studentIds?.includes(sid));}

// ─── TABS ────────────────────────────────────────────────────────────────────
function switchTab(tab){
  S.activeTab=tab;
  S.selectedStudents=new Set();
  S.search='';
  document.querySelectorAll('.main-tab').forEach((b,i)=>{
    b.classList.toggle('active',['courses','groups','quick','prizes','spending','ranking','stats','sync','coinflip','studentview'][i]===tab);
  });
  render();
}

// ─── STUDENT ACTIONS ─────────────────────────────────────────────────────────
function addStudent(courseId,name){
  if(!name.trim())return;
  S.students.push({id:uid(),courseId,name:name.trim(),points:{participacion:0,tareas:0,comportamiento:0,personalizado:0}});
  save();render();
}
function delStudent(id){
  if(!confirm('¿Eliminar este alumno y todos sus datos?'))return;
  S.students=S.students.filter(s=>s.id!==id);
  S.canjes=S.canjes.filter(c=>c.studentId!==id);
  S.groups.forEach(g=>{g.studentIds=(g.studentIds||[]).filter(x=>x!==id);});
  S.selectedStudents.delete(id);
  save();render();
}
function updPt(sid,type,delta){
  const s=S.students.find(s=>s.id===sid);if(!s)return;
  s.points[type]=Math.max(0,(s.points[type]||0)+delta);
  save();render();
}
// Give points to multiple students
function giveToSelected(type,amt){
  const ids=[...S.selectedStudents];
  if(!ids.length){alert('Seleccioná al menos un alumno');return;}
  ids.forEach(sid=>{
    const s=S.students.find(s=>s.id===sid);
    if(s)s.points[type]=Math.max(0,(s.points[type]||0)+amt);
  });
  save();render();
}
function giveToQuickSelected(type,amt){
  const ids=[...S.quickSelected];
  if(!ids.length){alert('Seleccioná al menos un alumno');return;}
  ids.forEach(sid=>{
    const s=S.students.find(s=>s.id===sid);
    if(s)s.points[type]=Math.max(0,(s.points[type]||0)+amt);
  });
  save();render();
}
function toggleSelect(sid){
  if(S.selectedStudents.has(sid))S.selectedStudents.delete(sid);
  else S.selectedStudents.add(sid);
  render();
}
function toggleQuickSelect(sid){
  if(S.quickSelected.has(sid))S.quickSelected.delete(sid);
  else S.quickSelected.add(sid);
  render();
}
function selectAllInCourse(courseId){
  const ids=S.students.filter(s=>s.courseId===courseId).map(s=>s.id);
  const allSelected=ids.every(id=>S.selectedStudents.has(id));
  if(allSelected)ids.forEach(id=>S.selectedStudents.delete(id));
  else ids.forEach(id=>S.selectedStudents.add(id));
  render();
}
function selectGroup(groupId){
  const g=S.groups.find(g=>g.id===groupId);if(!g)return;
  const ids=g.studentIds||[];
  const allSel=ids.every(id=>S.selectedStudents.has(id));
  if(allSel)ids.forEach(id=>S.selectedStudents.delete(id));
  else ids.forEach(id=>S.selectedStudents.add(id));
  render();
}
function clearSelection(){S.selectedStudents=new Set();render();}
function clearQuickSelection(){S.quickSelected=new Set();render();}

function deleteSelected(){
  const ids=[...S.selectedStudents];
  if(!ids.length)return;
  const names=ids.map(id=>S.students.find(s=>s.id===id)?.name||'').filter(Boolean);
  const preview=names.slice(0,5).join(', ')+(names.length>5?' y '+(names.length-5)+' más':'');
  if(!confirm('¿Eliminar '+ids.length+' alumno'+(ids.length>1?'s':'')+'?\n\n'+preview+'\n\nEsta acción no se puede deshacer.'))return;
  S.students=S.students.filter(s=>!ids.includes(s.id));
  S.canjes=S.canjes.filter(c=>!ids.includes(c.studentId));
  S.groups.forEach(g=>{g.studentIds=(g.studentIds||[]).filter(id=>!ids.includes(id));});
  S.selectedStudents=new Set();
  save();render();
}

function moveSelectedToCourse(){
  const ids=[...S.selectedStudents];
  if(!ids.length)return;
  const sel=document.getElementById('move-course-sel');
  if(!sel)return;
  const targetId=sel.value;
  const targetCourse=S.courses.find(c=>c.id===targetId);
  if(!targetCourse)return;
  ids.forEach(id=>{const s=S.students.find(s=>s.id===id);if(s)s.courseId=targetId;});
  S.selectedStudents=new Set();
  save();render();
}

function resetSelectedPoints(){
  const ids=[...S.selectedStudents];
  if(!ids.length)return;
  if(!confirm('¿Resetear todos los puntos de '+ids.length+' alumno'+(ids.length>1?'s':'')+'?\n\nSus puntos quedarán en 0. Los canjes no se borran.'))return;
  ids.forEach(id=>{const s=S.students.find(s=>s.id===id);if(s)s.points={participacion:0,tareas:0,comportamiento:0,personalizado:0};});
  S.selectedStudents=new Set();
  save();render();
}

function setSearch(v){
  S.search=v.toLowerCase();
  // Targeted update: only refresh the student/card list, never the input itself
  const tab=S.activeTab;
  if(tab==='courses'){
    refreshCourseRows();
  } else if(tab==='quick'){
    refreshQuickCards();
  } else if(tab==='ranking'||tab==='spending'){
    render(); // these tabs are simpler, cursor not an issue
  }
  // Update ✕ button visibility without touching the input
  const clearBtn=document.getElementById('search-clear');
  if(clearBtn) clearBtn.style.display=S.search?'':'none';
}
function clearSearch(){
  S.search='';
  const inp=document.getElementById('search-input');
  if(inp){inp.value='';inp.focus();}
  setSearch('');
}
function matchSearch(s){return !S.search||s.name.toLowerCase().includes(S.search);}

function renderSearchBox(placeholder){
  return `<div style="position:relative;max-width:340px">
    <span style="position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:15px;pointer-events:none">🔍</span>

      placeholder="${placeholder||'Buscar alumno...'}"

  </div>`;
}

function refreshCourseRows(){
  const el=document.getElementById('student-rows');
  if(!el)return;
  const course=S.courses.find(c=>c.id===S.activeCourseId);
  if(!course)return;
  const col=CC[course.colorIdx];
  const students=S.students.filter(s=>s.courseId===course.id).sort((a,b)=>totalPts(b)-totalPts(a));
  const filtered=students.filter(s=>matchSearch(s));
  if(students.length===0){

  } else if(!filtered.length){
    el.innerHTML='<div class="empty-msg">No hay resultados para "'+esc(S.search)+'"</div>';

    el.innerHTML=filtered.map((s)=>renderStudentRow(s,students.indexOf(s)+1,col.accent,true)).join('');

  if(!el)return;

// ─── IMPORT / EXPORT ─────────────────────────────────────────────────────────
function importExcel(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const wb=XLSX.read(ev.target.result,{type:'binary'});
      let added=0,skipped=0;
      wb.SheetNames.forEach(shName=>{
        const ws=wb.Sheets[shName];
        const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
        let course=S.courses.find(c=>c.name.toLowerCase().trim()===shName.toLowerCase().trim());
        if(!course)course=S.courses.find(c=>c.id===S.activeCourseId)||S.courses[0];
        rows.forEach((row,ri)=>{
          const name=String(row[0]||row[1]||'').trim();
          if(!name)return;
          if(ri===0&&(name.toLowerCase().includes('nombre')||name.toLowerCase().includes('alumno')))return;
          const exists=S.students.find(s=>s.courseId===course.id&&s.name.toLowerCase()===name.toLowerCase());
          if(exists){skipped++;return;}
          S.students.push({id:uid(),courseId:course.id,name,points:{participacion:0,tareas:0,comportamiento:0,personalizado:0}});
          added++;
        });
      });
      save();render();
      alert('✅ Importación:\n• '+added+' alumnos agregados\n• '+skipped+' ya existían\n\n💡 Nombrá las hojas igual que el curso para asignación automática.');
    }catch(err){alert('Error al leer el archivo.\n'+err.message);}
  };
  reader.readAsBinaryString(file);
  e.target.value='';
}
function exportExcel(){
  const wb=XLSX.utils.book_new();
  S.courses.forEach(course=>{
    const students=S.students.filter(s=>s.courseId===course.id).sort((a,b)=>totalPts(b)-totalPts(a));
    const rows=[['Alumno','Grupo','Participación','Tareas','Comportamiento','Personalizado','Total Pts','Canjeado','Saldo']];
    students.forEach(s=>{
      const grps=studentGroups(s.id).map(g=>g.name).join(', ');
      const spent=totalSpent(s.id);const pts=totalPts(s);
      rows.push([s.name,grps,s.points.participacion||0,s.points.tareas||0,s.points.comportamiento||0,s.points.personalizado||0,pts,spent,pts-spent]);
    });
    const ws=XLSX.utils.aoa_to_sheet(rows);
    ws['!cols']=[{wch:26},{wch:16},{wch:14},{wch:10},{wch:16},{wch:14},{wch:11},{wch:12},{wch:10}];
    XLSX.utils.book_append_sheet(wb,ws,course.name);
  });
  const canjeRows=[['Fecha','Alumno','Curso','Premio','Puntos','Nota']];
  S.canjes.forEach(c=>{
    const st=S.students.find(s=>s.id===c.studentId);
    const pr=S.prizes.find(p=>p.id===c.prizeId);
    const co=S.courses.find(x=>x.id===st?.courseId);
    canjeRows.push([c.date,st?.name||'—',co?.name||'—',(pr?.emoji||'')+' '+(pr?.name||'—'),c.pts,c.note||'']);
  });
  const wsC=XLSX.utils.aoa_to_sheet(canjeRows);
  wsC['!cols']=[{wch:12},{wch:26},{wch:12},{wch:24},{wch:10},{wch:30}];
  XLSX.utils.book_append_sheet(wb,wsC,'Canjes');
  XLSX.writeFile(wb,'ProfePoints_'+new Date().toISOString().slice(0,10)+'.xlsx');
}

// ─── URL SHARE ────────────────────────────────────────────────────────────────
function buildShareData(){
  return {
    version:1,
    exportedAt:new Date().toISOString(),
    courses:S.courses,
    students:S.students,
    groups:S.groups,
    prizes:S.prizes,
    canjes:S.canjes,
    ptAmount:S.ptAmount,
  };
}

function generateShareURL(){
  try{
    const json=JSON.stringify(buildShareData());
    const compressed=LZString.compressToEncodedURIComponent(json);
    const url=location.href.split('?')[0].split('#')[0]+'#pp='+compressed;
    return {url,sizeKB:Math.round(compressed.length/1024*10)/10};
  }catch(e){return null;}
}

function copyShareURL(){
  const result=generateShareURL();
  if(!result){alert('Error al generar el link.');return;}
  if(result.sizeKB>200){
    if(!confirm(`El link pesa ${result.sizeKB} KB — algunos navegadores podrían tener problemas con links muy largos.\n\n¿Continuar igual?`))return;
  }
  navigator.clipboard.writeText(result.url).then(()=>{
    const btn=document.getElementById('copy-url-btn');
    if(btn){const orig=btn.textContent;btn.textContent='✅ ¡Copiado!';setTimeout(()=>btn.textContent=orig,2500);}
  }).catch(()=>{
    // fallback: show in textarea
    const el=document.getElementById('share-url-display');
    if(el){el.value=result.url;el.style.display='block';el.select();}
  });
  updateShareStats();
}

function updateShareStats(){
  const el=document.getElementById('share-stats');
  if(!el)return;
  const result=generateShareURL();
  if(!result)return;
  el.textContent=`Link generado · ${result.sizeKB} KB · ${S.students.length} alumnos`;
}

function loadFromURL(){
  try{
    const hash=location.hash;
    if(!hash.startsWith('#pp='))return false;
    const compressed=hash.slice(4);
    const json=LZString.decompressFromEncodedURIComponent(compressed);
    if(!json)return false;
    const data=JSON.parse(json);
    if(!data.courses||!data.students)return false;
    S.courses=data.courses||S.courses;
    S.students=data.students||[];
    S.groups=data.groups||[];
    S.prizes=data.prizes||[];
    S.canjes=data.canjes||[];
    S.ptAmount=data.ptAmount||10;
    S.activeCourseId=S.courses[0]?.id||'c1';
    // Clean URL after loading so refreshing doesn't re-import
    history.replaceState(null,'',location.pathname+location.search);
    return data.students.length;
  }catch(e){return false;}
}

function exportBackup(){
  const data={
    version:1,
    exportedAt:new Date().toISOString(),
    courses:S.courses,
    students:S.students,
    groups:S.groups,
    prizes:S.prizes,
    canjes:S.canjes,
    ptAmount:S.ptAmount,
  };
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='ProfePoints_backup_'+new Date().toISOString().slice(0,10)+'.json';
  a.click();
  URL.revokeObjectURL(a.href);
}

function importBackup(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const data=JSON.parse(ev.target.result);
      if(!data.courses||!data.students){
        alert('❌ El archivo no parece un backup válido de ProfePoints.');
        return;
      }
      const countStudents=data.students?.length||0;
      const countCourses=data.courses?.length||0;
      if(!confirm(`¿Cargar este backup?\n\n📅 Exportado: ${data.exportedAt?new Date(data.exportedAt).toLocaleString('es-AR'):'-'}\n👨‍🎓 ${countStudents} alumnos en ${countCourses} cursos\n\n⚠️ Esto reemplazará TODOS los datos actuales.`)){
        e.target.value='';return;
      }
      S.courses=data.courses||S.courses;
      S.students=data.students||[];
      S.groups=data.groups||[];
      S.prizes=data.prizes||[];
      S.canjes=data.canjes||[];
      S.ptAmount=data.ptAmount||10;
      S.activeCourseId=S.courses[0]?.id||'c1';
      S.selectedStudents=new Set();
      S.quickSelected=new Set();
      S.search='';
      save();render();
      alert('✅ Backup cargado correctamente.\n'+countStudents+' alumnos restaurados.');
    }catch(err){
      alert('❌ Error al leer el archivo:\n'+err.message);
    }
  };
  reader.readAsText(file);
  e.target.value='';
}
function setAmt(v){
  S.ptAmount=v;
  document.querySelectorAll('.amt-chip').forEach(el=>el.classList.toggle('active',+el.dataset.v===v));
  const ci=document.getElementById('amt-custom');
  if(ci){if(!AMT_PRESETS.includes(v))ci.value=v;else ci.value='';}
  save();
}
function onCustomAmt(v){
  const n=parseInt(v);
  if(n>0){
    S.ptAmount=n;
    document.querySelectorAll('.amt-chip').forEach(el=>el.classList.remove('active'));
    save();
  }
}

    :`<span style="font-size:12px;color:#ccc;width:22px;flex-shrink:0;text-align:center">#${rank}</span>`;

  const balColor=bal<0?'#EF4444':bal>=20?'#10B981':'#F59E0B';

function quickSelectGroup(groupId){
  const g=S.groups.find(g=>g.id===groupId);if(!g)return;
  (g.studentIds||[]).forEach(id=>{
    const s=S.students.find(s=>s.id===id);
    if(s&&s.courseId===S.quickCourseId)S.quickSelected.add(id);
  });
  render();
}
function quickSelectAll(){
  const ids=S.students.filter(s=>s.courseId===S.quickCourseId).map(s=>s.id);
  const allSel=ids.every(id=>S.quickSelected.has(id));
  if(allSel)ids.forEach(id=>S.quickSelected.delete(id));

  render();
}

// ─── GOOGLE DRIVE SYNC ───────────────────────────────────────────────────────
// INSTRUCCIONES: Para usar Drive necesitás crear un proyecto en Google Cloud Console:
// 1. Ir a https://console.cloud.google.com
// 2. Crear proyecto → habilitar "Google Drive API" y "Google Picker API"
// 3. Credenciales → crear "ID de cliente OAuth 2.0" (tipo: Aplicación web)
//    - En "Orígenes de JS autorizados" agregar: file:// y http://localhost
//    - Copiar el Client ID abajo
// 4. Crear también una "Clave de API" y pegarla abajo
const GD_CLIENT_ID = '';   // ← pegá tu Client ID aquí
const GD_API_KEY   = '';   // ← pegá tu API Key aquí
const GD_SCOPE     = 'https://www.googleapis.com/auth/drive.file';
const GD_FILENAME  = 'ProfePoints_datos.json';

let gdAccessToken = null;
let gdFileId      = null;
let gdUserName    = '';
let gdInitDone    = false;

function gdConfigured(){ return GD_CLIENT_ID && GD_API_KEY; }

function gdInit(){
  if(gdInitDone||!gdConfigured())return;
  gapi.load('client',async()=>{
    await gapi.client.init({apiKey:GD_API_KEY,discoveryDocs:['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest']});
    gdInitDone=true;
  });
}

function gdSignIn(){
  if(!gdConfigured()){alert('⚙️ Primero configurá tu Client ID y API Key en el código.\nVer instrucciones en la pestaña ☁️ Sincronización.');return;}
  const client=google.accounts.oauth2.initTokenClient({
    client_id:GD_CLIENT_ID,
    scope:GD_SCOPE,
    callback:(resp)=>{
      if(resp.error)return;
      gdAccessToken=resp.access_token;
      // get user info
      fetch('https://www.googleapis.com/oauth2/v3/userinfo',{headers:{Authorization:'Bearer '+gdAccessToken}})
        .then(r=>r.json()).then(info=>{
          gdUserName=info.name||info.email||'Usuario';
          setGDStatus('🟢 '+gdUserName,'#10b981');
          render();
        });
    }
  });
  client.requestAccessToken();
}

function gdSignOut(){
  if(gdAccessToken)google.accounts.oauth2.revoke(gdAccessToken,()=>{});
  gdAccessToken=null;gdFileId=null;gdUserName='';
  setGDStatus('☁️ Drive','#64748b');
  render();
}

function setGDStatus(txt,color){
  const el=document.getElementById('gdrive-status');
  if(el){el.textContent=txt;el.style.color=color;}
}

async function gdFindFile(){
  const res=await gapi.client.drive.files.list({
    q:`name='${GD_FILENAME}' and trashed=false`,
    fields:'files(id,name,modifiedTime)',spaces:'drive'
  });
  const files=res.result.files;
  return files&&files.length?files[0]:null;
}

async function gdSave(){
  if(!gdAccessToken){alert('Primero conectate a Google Drive.');return;}
  setSS('☁️ sincronizando...','#6366F1');
  const data=JSON.stringify({version:1,exportedAt:new Date().toISOString(),
    courses:S.courses,students:S.students,groups:S.groups,
    prizes:S.prizes,canjes:S.canjes,ptAmount:S.ptAmount});
  try{
    const existing=await gdFindFile();
    const meta={name:GD_FILENAME,mimeType:'application/json'};
    const boundary='pp_boundary';
    const body=`--${boundary}\r\nContent-Type: application/json\r\n\r\n${JSON.stringify(meta)}\r\n--${boundary}\r\nContent-Type: application/json\r\n\r\n${data}\r\n--${boundary}--`;
    const method=existing?'PATCH':'POST';
    const url=existing
      ?`https://www.googleapis.com/upload/drive/v3/files/${existing.id}?uploadType=multipart`
      :'https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart';
    const res=await fetch(url,{method,headers:{'Authorization':'Bearer '+gdAccessToken,'Content-Type':`multipart/related; boundary=${boundary}`},body});
    const json=await res.json();
    gdFileId=json.id;
    setSS('✓ guardado','#10b981');
    setGDStatus('🟢 '+gdUserName,'#10b981');
    if(S.activeTab==='sync')render();
  }catch(e){
    setSS('✓ local','#10b981');
    alert('Error al guardar en Drive:\n'+e.message);
  }
}

async function gdLoad(){
  if(!gdAccessToken){alert('Primero conectate a Google Drive.');return;}
  try{
    const file=await gdFindFile();
    if(!file){alert('No se encontró ningún archivo guardado en Drive para esta app.');return;}
    const ts=file.modifiedTime?new Date(file.modifiedTime).toLocaleString('es-AR'):'desconocida';
    if(!confirm(`¿Cargar datos desde Google Drive?\n\n📅 Última modificación: ${ts}\n\n⚠️ Esto reemplazará los datos locales actuales.`))return;
    const res=await gapi.client.drive.files.get({fileId:file.id,alt:'media'});
    const data=typeof res.result==='string'?JSON.parse(res.result):res.result;
    S.courses=data.courses||S.courses;
    S.students=data.students||[];
    S.groups=data.groups||[];
    S.prizes=data.prizes||[];
    S.canjes=data.canjes||[];
    S.ptAmount=data.ptAmount||10;
    S.activeCourseId=S.courses[0]?.id||'c1';
    S.selectedStudents=new Set();S.quickSelected=new Set();S.search='';
    save();render();
    alert('✅ Datos cargados desde Google Drive.\n'+S.students.length+' alumnos restaurados.');
  }catch(e){alert('Error al cargar desde Drive:\n'+e.message);}
}

// ─── URL SYNC ─────────────────────────────────────────────────────────────────
// Auto-update the URL hash on every save so the link is always current
let _urlUpdateTimer = null;
function scheduleURLUpdate(){
  clearTimeout(_urlUpdateTimer);
  _urlUpdateTimer = setTimeout(()=>{
    try{
      const json = JSON.stringify(buildShareData());
      const compressed = LZString.compressToEncodedURIComponent(json);
      history.replaceState(null,'', location.pathname + '#pp=' + compressed);
    }catch(e){}
  }, 1200);
}

function headerCopyURL(){
  const btn = document.getElementById('url-copy-btn');
  try{
    const json = JSON.stringify(buildShareData());
    const compressed = LZString.compressToEncodedURIComponent(json);
    const url = location.href.split('?')[0].split('#')[0] + '#pp=' + compressed;
    navigator.clipboard.writeText(url).then(()=>{
      if(btn){btn.textContent='✅ ¡Link copiado!';btn.style.color='#6ee7b7';btn.style.borderColor='rgba(16,185,129,.5)';}
      setTimeout(()=>{if(btn){btn.textContent='🔗 Copiar link';btn.style.color='#a5b4fc';btn.style.borderColor='rgba(99,102,241,.4)';}},2800);
    }).catch(()=>{
      // fallback: select from temp input
      const inp = document.createElement('textarea');
      inp.value = url;
      document.body.appendChild(inp);
      inp.select();
      document.execCommand('copy');
      document.body.removeChild(inp);
      if(btn){btn.textContent='✅ ¡Link copiado!';setTimeout(()=>{btn.textContent='🔗 Copiar link';},2800);}
    });
    const kb = Math.round(compressed.length/1024*10)/10;
    console.log(`ProfePoints URL: ${kb} KB, ${S.students.length} alumnos`);
  }catch(e){ alert('Error al generar el link: '+e.message); }
}

  scheduleURLUpdate();
  if(!gdAccessToken) return;
  clearTimeout(_driveTimer);

<body>

<!-- SEARCH SCREEN -->
<div id="search-screen">

<div id="profile-screen">
  <div class="profile-header">

  </div>

      <div class="stat-num" id="pTotalPts" style="color:var(--indigo)">0</div>

    </div>

      <div class="stat-num" id="pSpent" style="color:var(--rose)">0</div>
      <div class="stat-lbl">Canjeados</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="pBalance" style="color:var(--emerald)">0</div>
      <div class="stat-lbl">Saldo</div>

  </div>

<script>
const APP_DATA = ${jsonData};

const PT_CONFIG = [
  {id:'participacion',label:'Participación',icon:'🙋',color:'#6366F1'},
  {id:'tareas',label:'Tareas',icon:'📚',color:'#F59E0B'},
  {id:'comportamiento',label:'Comportamiento',icon:'⭐',color:'#10B981'},
  {id:'personalizado',label:'Personalizado',icon:'🎯',color:'#EC4899'},
];

const CC_COLORS=['#6366F1','#F59E0B','#10B981','#EF4444','#8B5CF6','#0EA5E9'];
const GROUP_COLORS=['#6366F1','#F59E0B','#10B981','#EF4444','#8B5CF6','#06B6D4','#F97316','#EC4899'];
const RANK_MEDALS=['🥇','🥈','🥉'];

function avInit(n){return n.split(' ').map(w=>w[0]||'').join('').slice(0,2).toUpperCase()||'?';}
function avColor(n){const h=[...n].reduce((a,c)=>a+c.charCodeAt(0),0);return CC_COLORS[h%CC_COLORS.length];}
function totalPts(s){const p=s.points||{};return(p.participacion||0)+(p.tareas||0)+(p.comportamiento||0)+(p.personalizado||0);}
function totalSpent(sid){return APP_DATA.canjes.filter(c=>c.studentId===sid).reduce((a,c)=>a+(c.pts||0),0);}
function balance(s){return totalPts(s)-totalSpent(s.id);}
function fmtDate(d){try{return new Date(d).toLocaleDateString('es-AR',{day:'2-digit',month:'short',year:'numeric'});}catch{return d;}}

// Init
window.onload=()=>{
  const d=APP_DATA.exportedAt;
  if(d){
    document.getElementById('lastUpdated').textContent='Datos del '+fmtDate(d);
  }
  filterStudents('');
};

function filterStudents(v){
  const q=v.trim().toLowerCase();
  const list=document.getElementById('studentList');
  const students=[...APP_DATA.students].sort((a,b)=>totalPts(b)-totalPts(a));
  const filtered=q?students.filter(s=>s.name.toLowerCase().includes(q)):students;
  if(!filtered.length){
    list.innerHTML='<div class="no-results">No se encontró "'+v+'"</div>';
    return;
  }
  const show=filtered.slice(0,12);
  list.innerHTML=show.map(s=>{
    const course=APP_DATA.courses.find(c=>c.id===s.courseId);
    return \`<div class="student-item" onclick="showProfile('\${s.id}')">
      <div class="student-avatar" style="background:\${avColor(s.name)}">\${avInit(s.name)}</div>
      <div class="student-info">
        <div class="student-name">\${s.name}</div>
        <div class="student-course">\${course?course.name:'—'}</div>
      </div>
      <div class="student-pts">\${totalPts(s)} pts</div>
    </div>\`;
  }).join('');
}

function showProfile(sid){
  const s=APP_DATA.students.find(st=>st.id===sid);
  if(!s)return;
  const course=APP_DATA.courses.find(c=>c.id===s.courseId);
  const courseIdx=APP_DATA.courses.indexOf(course);
  const grps=(APP_DATA.groups||[]).filter(g=>(g.studentIds||[]).includes(sid));
  const pts=totalPts(s);
  const spent=totalSpent(sid);
  const bal=balance(s);

  // Header
  const av=document.getElementById('pAvatar');
  av.textContent=avInit(s.name);
  av.style.background=avColor(s.name);
  document.getElementById('pName').textContent=s.name;
  document.getElementById('pCourse').textContent=course?course.name:'';
  document.getElementById('pGroups').innerHTML=grps.map(g=>{
    const gc=GROUP_COLORS[g.colorIdx%GROUP_COLORS.length];
    return \`<span class="group-tag" style="background:\${gc}">\${g.name}</span>\`;
  }).join('');

  // Stats
  document.getElementById('pTotalPts').textContent=pts;
  document.getElementById('pSpent').textContent=spent;
  const balEl=document.getElementById('pBalance');
  balEl.textContent=bal;
  balEl.style.color=bal<0?'#EF4444':bal>=20?'#10B981':'#F59E0B';

  // Points grid
  const maxPt=Math.max(1,...PT_CONFIG.map(pt=>s.points?.[pt.id]||0));
  document.getElementById('pPointsGrid').innerHTML=PT_CONFIG.map(pt=>{
    const v=s.points?.[pt.id]||0;
    const pct=Math.round((v/maxPt)*100);
    return \`<div class="pt-card">
      <div class="pt-icon">\${pt.icon}</div>
      <div class="pt-val" style="color:\${pt.color}">\${v}</div>
      <div class="pt-lbl">\${pt.label}</div>
      <div class="pt-bar-wrap"><div class="pt-bar" style="width:\${pct}%;background:\${pt.color}"></div></div>
    </div>\`;
  }).join('');

  // Prizes
  const prizes=APP_DATA.prizes||[];
  if(prizes.length){
    document.getElementById('pPrizes').innerHTML=prizes.map(p=>{
      const canAfford=bal>=p.cost;
      return \`<div class="prize-card">
        <div class="prize-emoji">\${p.emoji||'🎁'}</div>
        <div class="prize-info">
          <div class="prize-name">\${p.name}</div>
          \${p.desc?\`<div class="prize-desc">\${p.desc}</div>\`:''}
        </div>
        <span class="prize-badge \${canAfford?'badge-ok':'badge-no'}">\${p.cost} pts\${canAfford?' ✓':' ✗'}</span>
      </div>\`;
    }).join('');
    document.getElementById('prizesSection').style.display='';
  } else {
    document.getElementById('prizesSection').style.display='none';
  }

  // Ranking — top 10 of same course
  const coursemates=[...APP_DATA.students.filter(st=>st.courseId===s.courseId)]
    .sort((a,b)=>totalPts(b)-totalPts(a));
  const top=coursemates.slice(0,10);
  const myRankGlobal=coursemates.indexOf(s)+1;
  document.getElementById('pRanking').innerHTML=top.map((st,i)=>{
    const isMe=st.id===sid;
    const medal=RANK_MEDALS[i]||'';
    return \`<div class="rank-item \${isMe?'highlight':''}">
      <div class="rank-pos">\${medal||(i+1)}</div>
      <div class="rank-av" style="background:\${avColor(st.name)}">\${avInit(st.name)}</div>
      <div class="rank-name">\${st.name}\${isMe?' 👈':''}</div>
      <div class="rank-pts">\${totalPts(st)}</div>
    </div>\`;
  }).join('');

  // Canjes
  const myCanjes=APP_DATA.canjes.filter(c=>c.studentId===sid).reverse();
  if(myCanjes.length){
    document.getElementById('pCanjes').innerHTML=myCanjes.map(c=>{
      const prize=APP_DATA.prizes.find(p=>p.id===c.prizeId);
      return \`<div class="canje-item">
        <div class="canje-emoji">\${prize?prize.emoji:'🎁'}</div>
        <div class="canje-info">
          <div class="canje-name">\${prize?prize.name:'Premio'}</div>
          <div class="canje-date">\${fmtDate(c.date)}\${c.note?' · '+c.note:''}</div>
        </div>
        <div class="canje-pts">-\${c.pts} pts</div>
      </div>\`;
    }).join('');
    document.getElementById('canjesSection').style.display='';
  } else {
    document.getElementById('canjesSection').style.display='none';
  }

  document.getElementById('search-screen').style.display='none';

function copyStudentViewLink(){
  const html = generateStudentPageHTML();
  const compressed = LZString.compressToEncodedURIComponent(html);
  // Use data: URL approach — but for large HTML, better to use blob URL shown to user
  // Actually encode as a self-opening link via data URI
  const blob = new Blob([html], {type:'text/html'});
  const blobUrl = URL.createObjectURL(blob);

  // Copy the blob URL is session-only. Better: encode as base64 data URI
  const b64 = btoa(unescape(encodeURIComponent(html)));
  const dataUrl = 'data:text/html;base64,' + b64;

  const btn = document.getElementById('sv-copy-btn');
  const display = document.getElementById('sv-url-display');

  // Check if data URI is small enough
  if(dataUrl.length < 2*1024*1024){ // < 2MB
    navigator.clipboard.writeText(dataUrl).then(()=>{
      btn.textContent = '✅ ¡Link copiado!';
      setTimeout(()=>btn.textContent='📋 Copiar link para alumnos', 3000);
    }).catch(()=>{
      display.value = dataUrl;
      display.style.display = 'block';
      display.select();
    });
  } else {
    // Too large for data URI — suggest download
    display.value = '⚠️ Los datos son demasiado grandes para un link directo. Usá "Descargar HTML" y compartí el archivo por Google Drive o similar.';
    display.style.display = 'block';
    btn.textContent = '⚠️ Ver instrucciones abajo';
    setTimeout(()=>btn.textContent='📋 Copiar link para alumnos', 4000);
  }
}

function downloadStudentViewHTML(){
  const html = generateStudentPageHTML();
  const blob = new Blob([html], {type:'text/html'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'ProfePoints_alumnos_'+new Date().toISOString().slice(0,10)+'.html';
  a.click();
  URL.revokeObjectURL(a.href);
}

let cfFlipping = false;
let cfTotalRot = 0;
let cfHistory = [];

function flipCoin() {
  if (cfFlipping) return;
  cfFlipping = true;
  const result = Math.random() < 0.5 ? 'cara' : 'seca';
  const coin = document.getElementById('cf-coin');
  const label = document.getElementById('cf-label');
  const btn = document.getElementById('cf-btn');
  if (!coin) return;

  label.style.opacity = '0';
  label.textContent = '';
  btn.disabled = true;
  btn.style.opacity = '0.5';

  const extraSpins = (5 + Math.floor(Math.random() * 4)) * 360;
  const landing = result === 'cara' ? 0 : 180;
  const base = Math.ceil(cfTotalRot / 360) * 360;
  const target = base + extraSpins + landing;
  cfTotalRot = target;

  coin.style.transition = 'none';
  coin.style.transform = `rotateY(${base}deg)`;
  coin.getBoundingClientRect();
  coin.style.transition = 'transform 2.2s cubic-bezier(0.15, 0.0, 0.1, 1.0)';
  coin.style.transform = `rotateY(${target}deg)`;

  setTimeout(() => {
    cfFlipping = false;
    btn.disabled = false;
    btn.style.opacity = '1';
    label.style.opacity = '1';
    label.textContent = result === 'cara' ? '🌟 ¡CARA!' : '⚡ ¡SECA!';
    label.style.color = result === 'cara' ? '#F59E0B' : '#6366F1';
    cfHistory.unshift(result);
    if (cfHistory.length > 20) cfHistory.pop();
    renderCFHistory();
  }, 2250);
}

function renderCFHistory() {
  const el = document.getElementById('cf-history');
  if (!el) return;
  if (!cfHistory.length) { el.innerHTML = '<span style="color:#94a3b8;font-size:13px">Aún no tiraste la moneda</span>'; return; }
  const caras = cfHistory.filter(x => x === 'cara').length;
  const secas = cfHistory.filter(x => x === 'seca').length;
  const chips = cfHistory.map((r, i) => {
    const isC = r === 'cara';
    return `<span style="display:inline-flex;align-items:center;gap:4px;background:${isC?'#FEF3C7':'#EEF2FF'};color:${isC?'#D97706':'#6366F1'};border-radius:20px;padding:3px 10px;font-size:12px;font-weight:700;${i===0?'border:2px solid '+(isC?'#F59E0B':'#6366F1'):''}">${isC?'🌟':'⚡'} ${isC?'Cara':'Seca'}</span>`;
  }).join('');
  el.innerHTML = `
    <div style="display:flex;gap:20px;margin-bottom:14px">
      <div style="text-align:center"><div style="font-size:26px;font-weight:900;color:#F59E0B">${caras}</div><div style="font-size:11px;color:#94a3b8;font-weight:600">🌟 CARAS</div></div>
      <div style="text-align:center"><div style="font-size:26px;font-weight:900;color:#6366F1">${secas}</div><div style="font-size:11px;color:#94a3b8;font-weight:600">⚡ SECAS</div></div>
      <div style="text-align:center"><div style="font-size:26px;font-weight:900;color:#1e293b">${cfHistory.length}</div><div style="font-size:11px;color:#94a3b8;font-weight:600">TOTAL</div></div>
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:6px">${chips}</div>`;
}

function renderCoinFlip() {
  const rot = cfTotalRot;
  return `
  <h2 class="section-title">🪙 Coin Flip</h2>
  <div style="display:flex;flex-direction:column;align-items:center;gap:24px;padding:10px 0 30px">
    <div style="perspective:900px">
      <div id="cf-coin" style="width:230px;height:230px;position:relative;transform-style:preserve-3d;transform:rotateY(${rot}deg);cursor:pointer;filter:drop-shadow(0 12px 32px rgba(0,0,0,.3))" onclick="flipCoin()">
        <div style="position:absolute;inset:0;backface-visibility:hidden;border-radius:50%;overflow:hidden">
          <img src="${CARA_IMG}" style="width:100%;height:100%;object-fit:cover;border-radius:50%" draggable="false"/>
        </div>
        <div style="position:absolute;inset:0;backface-visibility:hidden;border-radius:50%;overflow:hidden;transform:rotateY(180deg)">
          <img src="${SECA_IMG}" style="width:100%;height:100%;object-fit:cover;border-radius:50%" draggable="false"/>
        </div>
      </div>
    </div>
    <div id="cf-label" style="font-size:34px;font-weight:900;letter-spacing:1px;min-height:48px;transition:opacity .35s;text-shadow:0 2px 8px rgba(0,0,0,.1)"></div>
    <button id="cf-btn" onclick="flipCoin()"
      style="background:linear-gradient(135deg,#F59E0B,#D97706);border:none;border-radius:16px;padding:16px 52px;font-size:18px;font-weight:900;color:#fff;cursor:pointer;box-shadow:0 6px 24px rgba(245,158,11,.45);letter-spacing:.5px;transition:opacity .2s">
      🪙 ¡Tirar moneda!
    </button>
    <div style="background:#fff;border-radius:20px;padding:20px 24px;box-shadow:0 1px 6px rgba(0,0,0,.07);width:100%;max-width:480px">
      <div style="font-size:14px;font-weight:800;color:#1e293b;margin-bottom:12px">📊 Historial</div>
      <div id="cf-history"><span style="color:#94a3b8;font-size:13px">Aún no tiraste la moneda</span></div>
    </div>
  </div>`;
}


load();

S.quickSelected=new Set();

  }
}
render();

if(!FB_CONFIGURED){

}
// Iniciar Firebase (sincronización en tiempo real)
initFirebase();
